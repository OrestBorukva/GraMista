# Прод-стек GraMista на VPS. Запуск: docker compose -f docker-compose.prod.yml up -d
# Секрети — у /opt/gramista/.env поруч із цим файлом (шаблон: .env.prod.example).
name: gramista-prod

services:
  db:
    image: postgres:16
    container_name: gramista-prod-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: gramista
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: gramista
    # Лише loopback VPS — для SSH-тунеля (db:import з машини Ореста). НЕ відкривати назовні.
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gramista -d gramista"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: gramista-prod-web
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://gramista:${POSTGRES_PASSWORD}@db:5432/gramista?schema=public"
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${APP_BASE_URL}
      APP_BASE_URL: ${APP_BASE_URL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      # Закрита програма (персональне API mono без провайдерського доступу) — реєстрація
      # лише за особистим запрошенням; деталі lib/signups.ts.
      SIGNUPS_CLOSED: "1"
    depends_on:
      db:
        condition: service_healthy
    # Порти НЕ публікуємо — назовні дивиться лише caddy.

  caddy:
    image: caddy:2
    container_name: gramista-prod-caddy
    restart: unless-stopped
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN}
      CADDY_EMAIL: ${CADDY_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - web

volumes:
  pgdata:
  caddy-data:
  caddy-config:
